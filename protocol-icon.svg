<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1f2d"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="mark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3dd68c"/>
      <stop offset="100%" style="stop-color:#2ab87a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle grid lines -->
  <line x1="256" y1="80" x2="256" y2="432" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="80" y1="256" x2="432" y2="256" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <!-- P mark — geometric, precise -->
  <!-- Vertical stem -->
  <rect x="152" y="136" width="44" height="240" rx="6" fill="url(#mark)"/>
  <!-- Top bar -->
  <rect x="152" y="136" width="168" height="44" rx="6" fill="url(#mark)"/>
  <!-- Middle bar (shorter — makes the P) -->
  <rect x="152" y="234" width="148" height="44" rx="6" fill="url(#mark)"/>
  <!-- Cap (rounded end of P bowl) -->
  <rect x="256" y="136" width="64" height="142" rx="32" fill="url(#mark)"/>
  <!-- Data dots — three small circles suggesting tracking -->
  <circle cx="336" cy="340" r="14" fill="#3dd68c" opacity="0.9"/>
  <circle cx="336" cy="392" r="10" fill="#3dd68c" opacity="0.5"/>
  <circle cx="336" cy="436" r="7" fill="#3dd68c" opacity="0.25"/>
</svg>
